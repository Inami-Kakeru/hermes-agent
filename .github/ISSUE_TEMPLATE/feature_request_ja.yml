name: "✨ 機能リクエスト（日本語）"
description: 新しい機能や改善の提案。
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能リクエストありがとうございます！

        **提出前に確認してください：**
        - [ ] [既存のIssue](https://github.com/NousResearch/hermes-agent/issues)で類似のリクエストがないか検索
        - [ ] [Discussions](https://github.com/NousResearch/hermes-agent/discussions)でアイデアが議論されていないか確認

  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: どのような問題や不便さを解決したいですか？
      placeholder: |
        例：「○○をするとき、毎回△△しなければならないのが面倒です」
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: 理想的にはどう動作すべきだと思いますか？
      placeholder: |
        例：「コマンド `hermes xxx` で一発で実行できるようにしたい」
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に考えた方法があれば教えてください。

  - type: dropdown
    id: component
    attributes:
      label: 関連コンポーネント
      description: この機能はHermesのどの部分に関連しますか？
      multiple: true
      options:
        - CLI（対話型チャット）
        - ゲートウェイ（メッセージングプラットフォーム）
        - ツール
        - スキル
        - メモリ / 学習
        - 設定
        - ドキュメント
        - その他

  - type: checkboxes
    id: pr-ready
    attributes:
      label: PRの提出意向
      options:
        - label: 自分で実装してPRを提出したい

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Hermes Agent</title>
    <meta name="theme-color" content="#0A0E1A" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        position: relative;
        z-index: 1;
      }
      .error-code {
        font-family: var(--font-mono);
        font-size: clamp(72px, 15vw, 160px);
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary), var(--primary-light), #90B0FF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 16px;
        opacity: 0.7;
      }
      .error-message {
        font-size: 18px;
        color: var(--text-dim);
        margin-bottom: 32px;
      }
      .error-links {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="noise-overlay"></canvas>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="error-page">
      <div>
        <div class="error-code">404</div>
        <p class="error-message">This page doesn't exist — but Hermes Agent does.</p>
        <div class="error-links">
          <a href="/" class="btn btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Home
          </a>
          <a href="/ja/" class="btn btn-primary">日本語</a>
          <a href="/docs/" class="btn btn-primary">Docs</a>
        </div>
      </div>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"
      defer
    ></script>
    <script src="/script.js"></script>
  </body>
</html>
